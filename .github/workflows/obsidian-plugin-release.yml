name: Release Obsidian Plugin

# Publishes the Obsidian plugin to a dedicated standalone repository
# (kenforthewin/obsidian-atomic) because the Obsidian community directory does
# not support plugins living in a monorepo subdirectory — it expects
# manifest.json at the target repo's root.
#
# Setup (one-time):
#   1. Create an empty public repo: kenforthewin/obsidian-atomic
#   2. Create a fine-grained PAT with Contents: read/write on that repo
#   3. Add it to this repo's Actions secrets as OBSIDIAN_PLUGIN_REPO_TOKEN
#
# Release flow:
#   1. Bump version in plugins/obsidian-plugin/{manifest.json,package.json,versions.json}
#   2. Commit, then tag: git tag obsidian-v0.1.1 && git push --tags
#   3. This workflow syncs the plugin dir to the standalone repo and creates
#      a release there with the three required assets.

on:
  push:
    tags:
      - "obsidian-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: kenforthewin/obsidian-atomic
      PLUGIN_DIR: plugins/obsidian-plugin
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.PLUGIN_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm ci

      - name: Build
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm run build

      - name: Run tests
        working-directory: ${{ env.PLUGIN_DIR }}
        run: npm test

      - name: Verify manifest version matches tag
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          TAG="${GITHUB_REF#refs/tags/obsidian-v}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG) does not match manifest.json version ($MANIFEST_VERSION)" >&2
            exit 1
          fi
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi
          if ! node -e "const v=require('./versions.json'); process.exit(v['$TAG'] ? 0 : 1)"; then
            echo "versions.json is missing an entry for $TAG" >&2
            exit 1
          fi

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.OBSIDIAN_PLUGIN_REPO_TOKEN }}
          path: target-repo
          fetch-depth: 0

      - name: Sync plugin sources to target repo
        run: |
          # Wipe everything except .git, then copy the plugin contents over.
          # This guarantees the target repo mirrors the current plugin state
          # (deletes included).
          find target-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          rsync -a \
            --exclude='node_modules' \
            --exclude='main.js' \
            --exclude='main.js.map' \
            --exclude='data.json' \
            --exclude='.DS_Store' \
            "$PLUGIN_DIR"/ target-repo/

      - name: Commit and push to target repo
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#obsidian-v}"

          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit for $VERSION"
          else
            git commit -m "Release $VERSION"
            git push origin HEAD:main
          fi

          # Tag the synced commit in the target repo (with the plain vX.Y.Z
          # form that the Obsidian community directory expects).
          git tag -f "$VERSION"
          git push -f origin "refs/tags/$VERSION"

      - name: Create release on target repo
        env:
          GH_TOKEN: ${{ secrets.OBSIDIAN_PLUGIN_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#obsidian-v}"

          # Copy the built main.js into a staging dir so we can upload all
          # three assets with a single gh release create invocation.
          mkdir -p release-assets
          cp "$PLUGIN_DIR/manifest.json" release-assets/
          cp "$PLUGIN_DIR/main.js"       release-assets/
          cp "$PLUGIN_DIR/styles.css"    release-assets/

          gh release create "$VERSION" \
            --repo "$TARGET_REPO" \
            --title "$VERSION" \
            --generate-notes \
            release-assets/manifest.json \
            release-assets/main.js \
            release-assets/styles.css
