name: Docker

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: server.dockerfile
            image: atomic-server
            platform: linux/amd64
            runner: ubuntu-latest
          - dockerfile: server.dockerfile
            image: atomic-server
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - dockerfile: web.dockerfile
            image: atomic-web
            platform: linux/amd64
            runner: ubuntu-latest
          - dockerfile: web.dockerfile
            image: atomic-web
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - dockerfile: Dockerfile
            target: all-in-one
            image: atomic
            platform: linux/amd64
            runner: ubuntu-latest
          - dockerfile: Dockerfile
            target: all-in-one
            image: atomic
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - dockerfile: Dockerfile
            target: server-postgres
            image: atomic-server-postgres
            platform: linux/amd64
            runner: ubuntu-latest
          - dockerfile: Dockerfile
            target: server-postgres
            image: atomic-server-postgres
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - dockerfile: Dockerfile
            target: all-in-one-postgres
            image: atomic-postgres
            platform: linux/amd64
            runner: ubuntu-latest
          - dockerfile: Dockerfile
            target: all-in-one-postgres
            image: atomic-postgres
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        image:
          - atomic-server
          - atomic-web
          - atomic
          - atomic-server-postgres
          - atomic-postgres

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ matrix.image }}-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ matrix.image }}-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@sha256:%s ' *)
