services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: atomic_cloud
      POSTGRES_USER: atomic
      POSTGRES_PASSWORD: atomic_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  atomic-cloud:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://atomic:atomic_dev@postgres:5432/atomic_cloud
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-price_placeholder}
      FLY_API_TOKEN: ${FLY_API_TOKEN:-fo1_placeholder}
      FLY_APP_NAME: ${FLY_APP_NAME:-atomic-managed}
      FLY_REGION: ${FLY_REGION:-iad}
      ATOMIC_IMAGE: ${ATOMIC_IMAGE:-registry.fly.io/atomic:latest}
      BASE_DOMAIN: ${BASE_DOMAIN:-atomic.so}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}

volumes:
  pgdata:
